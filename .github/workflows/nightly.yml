# DELIVERABLE D: CI Wiring - Nightly Workflow
# ============================================
# Stratified Monte Carlo testing with configurable tiers.
# Uses fixtures/replay for most tests - no real sync except optionally one.
#
# Tiers (configurable):
#   - nightly: 9 runs
#   - twice-weekly: 19 runs  
#   - weekly: 59 runs
#
# NON-NEGOTIABLE: No additional sync calls beyond SYNC-02 in merge workflow.

name: Nightly Monte Carlo

on:
  schedule:
    # Run at 2 AM UTC daily
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      tier:
        description: 'Test tier (nightly=9, twice-weekly=19, weekly=59)'
        required: false
        default: 'nightly'
        type: choice
        options:
          - nightly
          - twice-weekly
          - weekly

env:
  # Configurable tier settings (NOT hardcoded in logic)
  TIER_NIGHTLY: 9
  TIER_TWICE_WEEKLY: 19
  TIER_WEEKLY: 59

jobs:
  determine-tier:
    runs-on: ubuntu-latest
    outputs:
      iterations: ${{ steps.tier.outputs.iterations }}
      tier_name: ${{ steps.tier.outputs.tier_name }}
      iteration_list: ${{ steps.iter.outputs.iteration_list }}
    steps:
      - id: tier
        run: |
          # Determine tier based on day of week or manual input
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TIER="${{ inputs.tier }}"
          else
            DOW=$(date +%u)  # 1=Monday, 7=Sunday
            if [ "$DOW" = "7" ]; then
              TIER="weekly"
            elif [ "$DOW" = "3" ] || [ "$DOW" = "6" ]; then
              TIER="twice-weekly"
            else
              TIER="nightly"
            fi
          fi
          
          case "$TIER" in
            weekly)
              echo "iterations=${{ env.TIER_WEEKLY }}" >> $GITHUB_OUTPUT
              ;;
            twice-weekly)
              echo "iterations=${{ env.TIER_TWICE_WEEKLY }}" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "iterations=${{ env.TIER_NIGHTLY }}" >> $GITHUB_OUTPUT
              ;;
          esac
          echo "tier_name=$TIER" >> $GITHUB_OUTPUT
      
      - name: Generate iteration list
        id: iter
        run: |
          count=${{ steps.tier.outputs.iterations }}
          list=$(seq 1 $count | jq -R . | jq -sc .)
          echo "iteration_list=$list" >> $GITHUB_OUTPUT

  monte-carlo-tests:
    needs: determine-tier
    runs-on: ubuntu-latest
    strategy:
      matrix:
        iteration: ${{ fromJSON(needs.determine-tier.outputs.iteration_list) }}
      fail-fast: false
      max-parallel: 3
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
      
      - name: Run iteration ${{ matrix.iteration }} of ${{ needs.determine-tier.outputs.iterations }}
        env:
          API_URL: ${{ secrets.API_URL }}
        run: |
          echo "=== Monte Carlo Iteration ${{ matrix.iteration }}/${{ needs.determine-tier.outputs.iterations }} ==="
          echo "Tier: ${{ needs.determine-tier.outputs.tier_name }}"
          bash carfax.sh
      
      - name: Report iteration result
        if: always()
        run: |
          echo "Iteration ${{ matrix.iteration }} completed"

  aggregate-results:
    needs: [determine-tier, monte-carlo-tests]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Aggregate Monte Carlo results
        run: |
          echo "=== Monte Carlo Summary ==="
          echo "Tier: ${{ needs.determine-tier.outputs.tier_name }}"
          echo "Iterations: ${{ needs.determine-tier.outputs.iterations }}"
          echo "SYNC-02: NOT RUN (nightly uses validators only)"
          echo "Status: Completed"
          echo ""
          echo "NOTE: Real sync calls only happen in merge-main workflow."
