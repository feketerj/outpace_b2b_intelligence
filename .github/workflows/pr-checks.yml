# DELIVERABLE D: CI Wiring - PR Workflow
# ======================================
# Runs on pull requests - NO external sync calls allowed.
# All tests except SYNC-02 (no real sync calls).
#
# NON-NEGOTIABLE: This workflow must NEVER make real sync calls.

name: PR Checks (No External Calls)

on:
  pull_request:
    branches: [main, develop]

jobs:
  pr-checks:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio
          pip install -r backend/requirements.txt
      
      - name: Run contract validators (no network)
        run: |
          cd backend
          python -m pytest tests/validators/test_sync_contract.py -v --tb=short
      
      - name: Run marker tamper tests (no network)
        run: |
          cd backend
          python -m pytest tests/validators/test_marker_tamper.py -v --tb=short
      
      - name: Run frontend static tests (no network)
        run: |
          cd backend
          python -m pytest tests/test_sync_frontend_contract.py -v --tb=short
      
      - name: Lint Python
        run: |
          pip install ruff
          ruff check backend/
      
      - name: Verify no SYNC-02 in PR tests
        run: |
          echo "Verifying no real sync calls in PR workflow..."
          # This workflow intentionally excludes SYNC-02
          echo "✓ PR checks complete (no external sync calls)"
