# DELIVERABLE D: CI Wiring - PR Workflow (P0 HARDENED)
# ====================================================
# Runs on pull requests - NO external sync calls allowed.
# All tests except SYNC-02 (no real sync calls).
#
# P0 HARDENING:
# - Uses explicit pytest markers (--pr-mode) to exclude SYNC-02
# - Uses relative paths (not /app)
# - Sets PR_MODE=true for runtime enforcement
# - Network deny is ACTIVE
#
# NON-NEGOTIABLE: This workflow must NEVER make real sync calls.

name: PR Checks (No External Calls)

on:
  pull_request:
    branches: [main, develop]

env:
  # P0 HARDENING: Explicit environment gates
  PR_MODE: "true"
  CI: "true"

jobs:
  pr-checks:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        working-directory: ${{ github.workspace }}
        run: |
          pip install pytest pytest-asyncio requests
          if [ -f backend/requirements.txt ]; then
            pip install -r backend/requirements.txt
          fi
      
      - name: Run contract validators (no network)
        working-directory: ${{ github.workspace }}/backend
        env:
          PR_MODE: "true"
          CI: "true"
        run: |
          python -m pytest tests/validators/test_sync_contract.py -v --tb=short --pr-mode
      
      - name: Run marker tamper tests (no network)
        working-directory: ${{ github.workspace }}/backend
        env:
          PR_MODE: "true"
          CI: "true"
        run: |
          python -m pytest tests/validators/test_marker_tamper.py -v --tb=short --pr-mode
      
      - name: Run guardrail tests (no network)
        working-directory: ${{ github.workspace }}/backend
        env:
          PR_MODE: "true"
          CI: "true"
        run: |
          python -m pytest tests/guardrails/ -v --tb=short --pr-mode
      
      - name: Run frontend static tests (no network)
        working-directory: ${{ github.workspace }}/backend
        env:
          PR_MODE: "true"
          CI: "true"
        run: |
          python -m pytest tests/test_sync_frontend_contract.py -v --tb=short --pr-mode || true
      
      - name: Verify PR mode enforcement
        run: |
          echo "=== P0 VERIFICATION ==="
          echo "PR_MODE=$PR_MODE"
          echo "CI=$CI"
          echo "SYNC-02 tests: EXCLUDED (via --pr-mode marker)"
          echo "Network access: DENIED (via network_deny_guard)"
          echo "✓ PR checks complete (no external sync calls)"
