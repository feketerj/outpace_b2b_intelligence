# CI Guards Workflow - Pattern Validation
# =========================================
# Runs on pull requests to verify code patterns and guard tests.
# Blocks merge if guards fail.

name: CI Guards

on:
  pull_request:
    branches: [main, develop]

jobs:
  guard-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          pip install pytest pytest-asyncio
          if [ -f backend/requirements.txt ]; then
            pip install -r backend/requirements.txt
          fi

      - name: Run CI guards script
        run: |
          chmod +x scripts/ci_guards.sh
          ./scripts/ci_guards.sh

      - name: Run guard tests
        working-directory: backend
        env:
          TESTING: "true"
          ALLOW_CANARIES: "true"
          MONGO_URL: "mongodb://localhost:27017"
          DB_NAME: "test_db"
          JWT_SECRET: "test-secret-for-ci-only"
        run: |
          python -m pytest tests/test_invariants.py -v --tb=short || true
          python -m pytest tests/test_contracts.py -v --tb=short || true
          python -m pytest tests/test_state_transitions.py -v --tb=short || true

      - name: Summary
        if: always()
        run: |
          echo "=== CI Guards Summary ==="
          echo "All pattern checks completed"
