name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        cd backend
        pip install -r requirements.txt

    - name: Seed test data
      env:
        MONGO_URL: mongodb://localhost:27017
        DB_NAME: outpace_intelligence
      run: |
        pip install pymongo bcrypt
        python scripts/seed_carfax_tenants.py
        python scripts/seed_carfax_users.py

    - name: Run pytest with coverage
      env:
        MONGO_URL: mongodb://localhost:27017
        DB_NAME: outpace_intelligence
        JWT_SECRET: test-secret-for-ci
      run: |
        pytest backend/tests/ -v --cov=backend --cov-report=xml --cov-report=term-missing --cov-fail-under=70

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: backend/coverage.xml

    - name: Start API server
      env:
        MONGO_URL: mongodb://localhost:27017
        DB_NAME: outpace_intelligence
        JWT_SECRET: test-secret-for-ci
      run: |
        uvicorn backend.server:app --host 0.0.0.0 --port 8000 &
        sleep 5

    - name: Run carfax tests
      env:
        API_URL: http://localhost:8000
      run: |
        chmod +x carfax.sh
        ./carfax.sh all

    - name: Compute report hashes
      if: always()
      run: |
        echo "=== ARTIFACT VERIFICATION ==="
        for f in carfax_reports/*.json; do
          sha256sum "$f"
        done

    - name: Upload test reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: carfax-reports
        path: carfax_reports/
