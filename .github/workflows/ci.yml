name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  test:
    name: pytest + carfax
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MONGO_URL: mongodb://localhost:27017
      JWT_SECRET: ci-test-jwt-secret-not-for-production
      DB_NAME: outpace_intelligence
      MISTRAL_API_KEY: ci-placeholder
      PERPLEXITY_API_KEY: ci-placeholder
      HIGHERGOV_API_KEY: ci-placeholder
      RATE_LIMIT_AUTH: 1000
      RATE_LIMIT_DEFAULT: 1000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements*.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Wait for MongoDB to be healthy
        run: |
          for i in {1..30}; do
            mongosh --eval 'db.adminCommand("ping")' --quiet && break
            echo "Waiting for MongoDB... ($i/30)"
            sleep 2
          done

      - name: Seed test data
        run: |
          python backend/scripts/seed_test_data.py 2>/dev/null || \
            echo "No seed script found or seed not required — continuing"

      - name: Start uvicorn server
        run: |
          uvicorn backend.server:app \
            --host 0.0.0.0 --port 8000 \
            --log-level warning &
          # Wait until the health endpoint responds
          for i in {1..30}; do
            curl -sf http://localhost:8000/api/health && break
            echo "Waiting for uvicorn... ($i/30)"
            sleep 2
          done

      - name: Run pytest with coverage
        run: |
          pytest \
            --cov=backend \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -v \
            backend/tests/

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ github.sha }}
          path: coverage.xml
          retention-days: 30

      - name: Run carfax integration tests
        run: |
          chmod +x carfax.sh
          ./carfax.sh

      - name: Stop uvicorn server
        if: always()
        run: pkill -f "uvicorn backend.server:app" || true
