name: Hash Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify-hashes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run hash gate
        run: |
          chmod +x scripts/hash_gate.sh
          ./scripts/hash_gate.sh
