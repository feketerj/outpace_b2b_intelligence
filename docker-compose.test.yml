version: "3.9"

services:
  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    networks:
      - test-net

  api:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=outpace_test
      - JWT_SECRET=test-secret-key
    depends_on:
      - mongodb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - test-net

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      - API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    networks:
      - test-net

networks:
  test-net:
    driver: bridge
