services:
  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - test-net

  seeder:
    image: python:3.11-slim
    profiles:
      - seed
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./scripts:/app/scripts
    working_dir: /app
    command: bash -c "pip install pymongo bcrypt && python scripts/seed_carfax_users.py && python scripts/seed_carfax_tenants.py"
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=outpace_intelligence
      - CARFAX_ADMIN_EMAIL=${CARFAX_ADMIN_EMAIL:-admin@example.com}
      - CARFAX_ADMIN_PASSWORD=${CARFAX_ADMIN_PASSWORD:?CARFAX_ADMIN_PASSWORD not set}
      - CARFAX_TENANT_A_EMAIL=${CARFAX_TENANT_A_EMAIL:-tenant-a@test.com}
      - CARFAX_TENANT_A_PASSWORD=${CARFAX_TENANT_A_PASSWORD:?CARFAX_TENANT_A_PASSWORD not set}
      - CARFAX_TENANT_B_EMAIL=${CARFAX_TENANT_B_EMAIL:-tenant-b@test.com}
      - CARFAX_TENANT_B_PASSWORD=${CARFAX_TENANT_B_PASSWORD:?CARFAX_TENANT_B_PASSWORD not set}
    restart: "no"
    networks:
      - test-net

  api:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=outpace_intelligence
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET not set}
      - CARFAX_ADMIN_EMAIL=${CARFAX_ADMIN_EMAIL:-admin@example.com}
      - CARFAX_ADMIN_PASSWORD=${CARFAX_ADMIN_PASSWORD:?CARFAX_ADMIN_PASSWORD not set}
      - CARFAX_TENANT_A_EMAIL=${CARFAX_TENANT_A_EMAIL:-tenant-a@test.com}
      - CARFAX_TENANT_A_PASSWORD=${CARFAX_TENANT_A_PASSWORD:?CARFAX_TENANT_A_PASSWORD not set}
      - CARFAX_TENANT_B_EMAIL=${CARFAX_TENANT_B_EMAIL:-tenant-b@test.com}
      - CARFAX_TENANT_B_PASSWORD=${CARFAX_TENANT_B_PASSWORD:?CARFAX_TENANT_B_PASSWORD not set}
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - test-net

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      - API_URL=http://api:8000
      - CARFAX_ADMIN_EMAIL=${CARFAX_ADMIN_EMAIL:-admin@example.com}
      - CARFAX_ADMIN_PASSWORD=${CARFAX_ADMIN_PASSWORD:?CARFAX_ADMIN_PASSWORD not set}
      - CARFAX_TENANT_A_EMAIL=${CARFAX_TENANT_A_EMAIL:-tenant-a@test.com}
      - CARFAX_TENANT_A_PASSWORD=${CARFAX_TENANT_A_PASSWORD:?CARFAX_TENANT_A_PASSWORD not set}
      - CARFAX_TENANT_B_EMAIL=${CARFAX_TENANT_B_EMAIL:-tenant-b@test.com}
      - CARFAX_TENANT_B_PASSWORD=${CARFAX_TENANT_B_PASSWORD:?CARFAX_TENANT_B_PASSWORD not set}
      - E2E_ADMIN_EMAIL=${E2E_ADMIN_EMAIL:-admin@example.com}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - test-net

networks:
  test-net:
    driver: bridge
