steps:
  # Build backend image from the backend context expected by backend/Dockerfile.
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/outpace/backend:latest'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/outpace/backend:$SHORT_SHA'
      - '-f'
      - 'backend/Dockerfile'
      - 'backend'

  # Build frontend image from the frontend context expected by frontend/Dockerfile.
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-frontend'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/outpace/frontend:latest'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/outpace/frontend:$SHORT_SHA'
      - '--build-arg'
      - 'REACT_APP_BACKEND_URL=${_API_URL}'
      - '-f'
      - 'frontend/Dockerfile'
      - 'frontend'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend-latest'
    waitFor: ['build-backend']
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/outpace/backend:latest'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend-sha'
    waitFor: ['build-backend']
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/outpace/backend:$SHORT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-frontend-latest'
    waitFor: ['build-frontend']
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/outpace/frontend:latest'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-frontend-sha'
    waitFor: ['build-frontend']
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/outpace/frontend:$SHORT_SHA'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'render-manifests'
    waitFor: ['push-backend-sha', 'push-frontend-sha']
    entrypoint: bash
    args:
      - '-ceu'
      - |
        test -n '${_PROJECT_ID}' || { echo "_PROJECT_ID substitution is required"; exit 1; }
        test -n '${_WEB_ORIGIN}' || { echo "_WEB_ORIGIN substitution is required"; exit 1; }
        test -n '${_API_URL}' || { echo "_API_URL substitution is required"; exit 1; }
        mkdir -p /workspace/rendered
        sed \
          -e 's|PROJECT_ID|${_PROJECT_ID}|g' \
          -e 's|REGION|${_REGION}|g' \
          -e 's|BACKEND_IMAGE|${_REGION}-docker.pkg.dev/${_PROJECT_ID}/outpace/backend:'"$SHORT_SHA"'|g' \
          -e 's|WEB_ORIGIN|${_WEB_ORIGIN}|g' \
          gcp/cloud-run-api.yaml > /workspace/rendered/cloud-run-api.yaml
        sed \
          -e 's|PROJECT_ID|${_PROJECT_ID}|g' \
          -e 's|REGION|${_REGION}|g' \
          -e 's|FRONTEND_IMAGE|${_REGION}-docker.pkg.dev/${_PROJECT_ID}/outpace/frontend:'"$SHORT_SHA"'|g' \
          gcp/cloud-run-web.yaml > /workspace/rendered/cloud-run-web.yaml

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-backend'
    waitFor: ['render-manifests']
    entrypoint: gcloud
    args:
      - 'run'
      - 'services'
      - 'replace'
      - '/workspace/rendered/cloud-run-api.yaml'
      - '--region=${_REGION}'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend'
    waitFor: ['render-manifests']
    entrypoint: gcloud
    args:
      - 'run'
      - 'services'
      - 'replace'
      - '/workspace/rendered/cloud-run-web.yaml'
      - '--region=${_REGION}'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'traffic-backend'
    waitFor: ['deploy-backend']
    entrypoint: gcloud
    args:
      - 'run'
      - 'services'
      - 'update-traffic'
      - 'outpace-api'
      - '--to-latest'
      - '--region=${_REGION}'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'traffic-frontend'
    waitFor: ['deploy-frontend']
    entrypoint: gcloud
    args:
      - 'run'
      - 'services'
      - 'update-traffic'
      - 'outpace-web'
      - '--to-latest'
      - '--region=${_REGION}'

images:
  - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/outpace/backend:latest'
  - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/outpace/backend:$SHORT_SHA'
  - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/outpace/frontend:latest'
  - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/outpace/frontend:$SHORT_SHA'

substitutions:
  _REGION: us-central1
  _PROJECT_ID: ''  # Required; set via trigger or --substitutions flag.
  _API_URL: ''     # Required public API origin, e.g. https://outpace-api-...run.app.
  _WEB_ORIGIN: ''  # Required public frontend origin for CORS.

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
